name: Tests

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: candle
          POSTGRES_PASSWORD: candle
          POSTGRES_DB: candle_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://candle:candle@localhost:5432/candle_test
      API_KEY: test-secret
      TELEGRAM_BOT_TOKEN: ""
      TELEGRAM_CHAT_ID: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: alembic upgrade head
      - run: pytest
