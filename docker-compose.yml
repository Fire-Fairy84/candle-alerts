services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: candle
      POSTGRES_PASSWORD: candle
      POSTGRES_DB: candle
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U candle"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
